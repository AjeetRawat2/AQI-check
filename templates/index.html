<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid IoT Air Quality Dashboard</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js for graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-6">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center bg-white p-6 rounded-lg shadow-md mb-6">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">☁️ Air Quality Monitor</h1>
                <p class="text-gray-500 text-sm mt-1">Accepting real ESP32 data & software simulations</p>
            </div>
            
            <div class="flex items-center space-x-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Location Node</label>
                    <select id="locationSelect" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                        {% for loc in locations %}
                            <option value="{{ loc }}">{{ loc }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <!-- SIMULATION TOGGLE -->
                <div class="bg-blue-50 p-3 rounded border border-blue-200">
                    <label class="flex items-center cursor-pointer">
                        <div class="relative">
                            <input type="checkbox" id="simToggle" class="sr-only">
                            <div class="block bg-gray-300 w-10 h-6 rounded-full shadow-inner toggle-bg"></div>
                            <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition toggle-dot"></div>
                        </div>
                        <span class="ml-3 text-sm font-semibold text-blue-800">Enable Simulator</span>
                    </label>
                </div>
            </div>
        </div>

        <!-- KPI Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-blue-500">
                <h3 class="text-gray-500 text-sm font-semibold">Latest AQI</h3>
                <p id="kpi-aqi" class="text-4xl font-bold text-gray-800 mt-2">--</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-green-500">
                <h3 class="text-gray-500 text-sm font-semibold">PM2.5 (µg/m³)</h3>
                <p id="kpi-pm25" class="text-4xl font-bold text-gray-800 mt-2">--</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-yellow-500">
                <h3 class="text-gray-500 text-sm font-semibold">PM10 (µg/m³)</h3>
                <p id="kpi-pm10" class="text-4xl font-bold text-gray-800 mt-2">--</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow border-l-4 border-purple-500">
                <h3 class="text-gray-500 text-sm font-semibold">Data Source</h3>
                <p id="kpi-source" class="text-xl font-bold text-gray-800 mt-2">Waiting...</p>
            </div>
        </div>

        <!-- Chart -->
        <div class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Real-Time AQI Trend</h2>
            <canvas id="aqiChart" height="100"></canvas>
        </div>
    </div>

    <style>
        /* Custom CSS for the toggle switch */
        input:checked ~ .toggle-bg { background-color: #3b82f6; }
        input:checked ~ .dot { transform: translateX(100%); }
    </style>

    <script>
        // Setup Chart.js
        const ctx = document.getElementById('aqiChart').getContext('2d');
        const aqiChart = new Chart(ctx, {
            type: 'line',
            data: { 
                labels: [], 
                datasets: [{ 
                    label: 'Air Quality Index', 
                    data: [], 
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.3
                }] 
            },
            options: { responsive: true, animation: { duration: 0 } }
        });

        // Function to update the dashboard
        async function updateDashboard() {
            const location = document.getElementById('locationSelect').value;
            const isSimulating = document.getElementById('simToggle').checked;

            // 1. If simulation is ON, tell the backend to generate fake data first
            if (isSimulating) {
                await fetch('/api/simulate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ location: location })
                });
            }

            // 2. Fetch the latest data for the charts and KPIs
            const response = await fetch(`/api/data/${location}`);
            const data = await response.json();

            // Update Chart
            aqiChart.data.labels = data.timestamps;
            aqiChart.data.datasets[0].data = data.aqi;
            aqiChart.update();

            // Update KPIs
            if (data.latest) {
                document.getElementById('kpi-aqi').innerText = data.latest.aqi;
                document.getElementById('kpi-pm25').innerText = data.latest.pm25;
                document.getElementById('kpi-pm10').innerText = data.latest.pm10;
                
                const sourceEl = document.getElementById('kpi-source');
                sourceEl.innerText = data.latest.source;
                sourceEl.className = data.latest.source === 'Simulated' ? 'text-xl font-bold text-blue-600 mt-2' : 'text-xl font-bold text-green-600 mt-2';
            }
        }

        // Run the update loop every 3 seconds
        setInterval(updateDashboard, 3000);
        
        // Initial load
        updateDashboard();
    </script>
</body>
</html>
